services:

  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Password
      MYSQL_DATABASE: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: ecommerce_api
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

volumes:
  mysql_data: